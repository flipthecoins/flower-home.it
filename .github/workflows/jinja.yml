name: Modo Jinja

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: Fuerza la conmutacion aunque no hayan pasado 7 dias
        required: false
        default: false
        type: boolean

concurrency:
  group: jinja-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRIMEINDEXER_API_KEY: ${{ secrets.PRIMEINDEXER_API_KEY }}
      PRIMEINDEXER_DELAY_SECONDS: ${{ vars.PRIMEINDEXER_DELAY_SECONDS }}
      WORKER_SECRET_VALUES_JSON: ${{ secrets.WORKER_SECRET_VALUES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update bot index
        id: update
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            node scripts/jinja-mode.mjs --config proyectos/flower-home.it/jinja.config.json --force
          else
            node scripts/jinja-mode.mjs --config proyectos/flower-home.it/jinja.config.json
          fi

          if git diff --quiet -- proyectos/flower-home.it/bot/index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proyectos/flower-home.it/bot/index.html
          git commit -m "chore(jinja): rotate flower-home.it bot sections"
          git push

      - name: Install Wrangler
        if: steps.update.outputs.changed == 'true'
        run: npm install --global wrangler

      - name: Validate stacks
        if: steps.update.outputs.changed == 'true'
        run: |
          find proyectos -mindepth 2 -maxdepth 2 -name stack.json -print0 | xargs -0 -n1 bash scripts/validate-stack.sh

      - name: Deploy all
        if: steps.update.outputs.changed == 'true'
        run: bash scripts/deploy.sh

      - name: Submit external indexer
        if: steps.update.outputs.changed == 'true'
        run: bash scripts/submit-indexer.sh proyectos/flower-home.it/stack.json
