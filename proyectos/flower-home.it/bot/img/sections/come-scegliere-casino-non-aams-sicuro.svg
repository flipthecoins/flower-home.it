<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#14264a"/><stop offset="100%" stop-color="#050c1a"/>
  </radialGradient>
  <radialGradient id="spot" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c547" stop-opacity="0.17"/><stop offset="100%" stop-color="#e8c547" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="gv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f7e07a"/><stop offset="100%" stop-color="#c49a1a"/>
  </linearGradient>
  <linearGradient id="nv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2f65cf"/><stop offset="100%" stop-color="#0f2060"/>
  </linearGradient>
  <linearGradient id="nlid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a72e0"/><stop offset="100%" stop-color="#1a3c9a"/>
  </linearGradient>
  <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e3a94"/><stop offset="100%" stop-color="#0a1640"/>
  </linearGradient>
  <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
  </filter>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1200" height="700" fill="url(#bg)"/>
<ellipse cx="600" cy="340" rx="300" ry="230" fill="url(#spot)"/>
<g filter="url(#ds)">

<g transform="translate(600,330)">
  <!-- Shield shadow -->
  <path d="M 2,2 L 202,76 L 202,258 C 202,356 2,410 2,410 C 2,410 -198,356 -198,258 L -198,76 Z"
    fill="#000" opacity="0.4"/>
  <!-- Shield body -->
  <path d="M 0,-196 L 200,74 L 200,256 C 200,354 0,408 0,408 C 0,408 -200,354 -200,256 L -200,74 Z"
    fill="url(#nv)"/>
  <!-- Shield inner lighter fill for depth -->
  <path d="M 0,-156 L 165,78 L 165,252 C 165,328 0,374 0,374 C 0,374 -165,328 -165,252 L -165,78 Z"
    fill="rgba(255,255,255,0.05)"/>
  <!-- Gold border -->
  <path d="M 0,-196 L 200,74 L 200,256 C 200,354 0,408 0,408 C 0,408 -200,354 -200,256 L -200,74 Z"
    fill="none" stroke="url(#gv)" stroke-width="6"/>
  <!-- Checkmark (bold, rounded) -->
  <polyline points="-92,120 -18,196 108,38"
    fill="none" stroke="url(#gv)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Subtle shield shine -->
  <path d="M 0,-196 L 200,74 L 130,30 L 0,-140 L -130,30 L -200,74 Z"
    fill="rgba(255,255,255,0.04)"/>
</g>
</g>
<text x="600" y="612" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="50" fill="#ffffff" letter-spacing="-1">COME SCEGLIERE</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.34)" letter-spacing="6">CASINO SICURO E AFFIDABILE</text>
<text x="600" y="686" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.14)" letter-spacing="3">flower-home.it</text>
</svg>