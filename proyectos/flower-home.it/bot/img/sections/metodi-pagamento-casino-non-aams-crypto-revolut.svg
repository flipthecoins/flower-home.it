<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#14264a"/><stop offset="100%" stop-color="#050c1a"/>
  </radialGradient>
  <radialGradient id="spot" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c547" stop-opacity="0.17"/><stop offset="100%" stop-color="#e8c547" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="gv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f7e07a"/><stop offset="100%" stop-color="#c49a1a"/>
  </linearGradient>
  <linearGradient id="nv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2f65cf"/><stop offset="100%" stop-color="#0f2060"/>
  </linearGradient>
  <linearGradient id="nlid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a72e0"/><stop offset="100%" stop-color="#1a3c9a"/>
  </linearGradient>
  <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e3a94"/><stop offset="100%" stop-color="#0a1640"/>
  </linearGradient>
  <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
  </filter>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1200" height="700" fill="url(#bg)"/>
<ellipse cx="600" cy="330" rx="300" ry="230" fill="url(#spot)"/>
<g filter="url(#ds)">

<g transform="translate(600,330)">
  <!-- Card shadow (slightly offset) -->
  <rect x="-196" y="-114" width="392" height="242" rx="20" fill="#000" opacity="0.35" transform="rotate(-7)"/>
  <!-- Card body -->
  <rect x="-192" y="-118" width="392" height="242" rx="20" fill="url(#card)" transform="rotate(-7)"/>
  <!-- Card shine strip -->
  <rect x="-192" y="-118" width="392" height="80" rx="20" fill="rgba(255,255,255,0.09)" transform="rotate(-7)"/>
  <!-- Magnetic stripe -->
  <rect x="-192" y="-38" width="392" height="50" fill="rgba(0,0,0,0.45)" transform="rotate(-7)"/>
  <!-- EMV Chip -->
  <g transform="rotate(-7) translate(-130,42)">
    <rect x="-34" y="-26" width="68" height="52" rx="8" fill="url(#gv)"/>
    <line x1="-34" y1="-6" x2="34" y2="-6" stroke="#c49a1a" stroke-width="1.5"/>
    <line x1="-34" y1="8"  x2="34" y2="8"  stroke="#c49a1a" stroke-width="1.5"/>
    <line x1="-10" y1="-26" x2="-10" y2="26" stroke="#c49a1a" stroke-width="1.5"/>
    <line x1="10"  y1="-26" x2="10"  y2="26" stroke="#c49a1a" stroke-width="1.5"/>
  </g>
  <!-- Contactless waves (right side of card) -->
  <g transform="rotate(-7) translate(100,42)" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="5" stroke-linecap="round">
    <path d="M 0,-20 Q 18,0 0,20"/>
    <path d="M 12,-38 Q 42,0 12,38"/>
    <path d="M 24,-56 Q 66,0 24,56"/>
  </g>
  <!-- Card number dots -->
  <g transform="rotate(-7) translate(-60,90)" fill="rgba(255,255,255,0.55)">
    <circle cx="-100" cy="0" r="7"/><circle cx="-80" cy="0" r="7"/>
    <circle cx="-60"  cy="0" r="7"/><circle cx="-40" cy="0" r="7"/>
    <circle cx="-12"  cy="0" r="7"/><circle cx="8"   cy="0" r="7"/>
    <circle cx="28"   cy="0" r="7"/><circle cx="48"  cy="0" r="7"/>
    <circle cx="76"   cy="0" r="7"/><circle cx="96"  cy="0" r="7"/>
    <circle cx="116"  cy="0" r="7"/><circle cx="136" cy="0" r="7"/>
  </g>
  <!-- Gold coin overlapping bottom-right of card -->
  <circle cx="160" cy="90" r="92" fill="#c49a1a"/>
  <circle cx="160" cy="90" r="86" fill="url(#gv)"/>
  <!-- Coin inner ring -->
  <circle cx="160" cy="90" r="70" fill="none" stroke="#c49a1a" stroke-width="4"/>
  <!-- Coin ridges (decorative lines on edge) -->
  <circle cx="160" cy="90" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5" stroke-dasharray="6,5"/>
  <!-- B symbol on coin (stylized) - drawn as paths -->
  <g transform="translate(160,90)" fill="#0f2060">
    <!-- vertical stem -->
    <rect x="-14" y="-38" width="11" height="76" rx="3"/>
    <!-- top bump -->
    <path d="M -3,-38 L 12,-38 Q 36,-38 36,-18 Q 36,2 -3,2 Z" rx="5"/>
    <!-- bottom bump -->
    <path d="M -3,2 L 14,2 Q 40,2 40,22 Q 40,42 -3,42 Z"/>
    <!-- double bar strokes across B -->
    <rect x="-20" y="-6" width="8" height="8" rx="2" fill="url(#gv)"/>
    <rect x="-20" y="8"  width="8" height="8" rx="2" fill="url(#gv)"/>
  </g>
</g>
</g>
<text x="600" y="612" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="50" fill="#ffffff" letter-spacing="-1">PAGAMENTI</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.34)" letter-spacing="6">CRYPTO · CARTA · WALLET</text>
<text x="600" y="686" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.14)" letter-spacing="3">flower-home.it</text>
</svg>