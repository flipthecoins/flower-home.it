<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#14264a"/><stop offset="100%" stop-color="#050c1a"/>
  </radialGradient>
  <radialGradient id="spot" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c547" stop-opacity="0.17"/><stop offset="100%" stop-color="#e8c547" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="gv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f7e07a"/><stop offset="100%" stop-color="#c49a1a"/>
  </linearGradient>
  <linearGradient id="nv" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2f65cf"/><stop offset="100%" stop-color="#0f2060"/>
  </linearGradient>
  <linearGradient id="nlid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a72e0"/><stop offset="100%" stop-color="#1a3c9a"/>
  </linearGradient>
  <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e3a94"/><stop offset="100%" stop-color="#0a1640"/>
  </linearGradient>
  <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
  </filter>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1200" height="700" fill="url(#bg)"/>
<ellipse cx="600" cy="340" rx="300" ry="230" fill="url(#spot)"/>
<g filter="url(#ds)">

<g transform="translate(600,345)">
  <!-- Ground shadow -->
  <ellipse cx="0" cy="178" rx="168" ry="20" fill="#000" opacity="0.32"/>
  <!-- Box body -->
  <rect x="-158" y="-68" width="316" height="246" rx="16" fill="url(#nv)"/>
  <rect x="-158" y="-68" width="316" height="60" rx="16" fill="rgba(255,255,255,0.07)"/>
  <!-- Lid -->
  <rect x="-176" y="-138" width="352" height="82" rx="14" fill="url(#nlid)"/>
  <rect x="-176" y="-138" width="352" height="36" rx="14" fill="rgba(255,255,255,0.10)"/>
  <!-- Vertical ribbon – body -->
  <rect x="-21" y="-68" width="42" height="246" fill="url(#gv)"/>
  <!-- Vertical ribbon – lid -->
  <rect x="-21" y="-138" width="42" height="82" fill="url(#gv)"/>
  <!-- Horizontal ribbon on lid -->
  <rect x="-176" y="-112" width="352" height="35" fill="url(#gv)"/>
  <!-- Bow – left teardrop (bezier) -->
  <path d="M 0,-144 C -5,-186 -74,-206 -103,-178 C -132,-150 -117,-109 -70,-108 C -23,-107 0,-144 0,-144 Z" fill="url(#gv)"/>
  <!-- Bow – right teardrop -->
  <path d="M 0,-144 C 5,-186 74,-206 103,-178 C 132,-150 117,-109 70,-108 C 23,-107 0,-144 0,-144 Z" fill="url(#gv)"/>
  <!-- Bow knot -->
  <ellipse cx="0" cy="-146" rx="26" ry="22" fill="#f7e07a"/>
  <ellipse cx="0" cy="-146" rx="15" ry="13" fill="#c49a1a"/>
</g>
</g>
<text x="600" y="612" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="50" fill="#ffffff" letter-spacing="-1">BONUS</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.34)" letter-spacing="6">CASINO NON AAMS</text>
<text x="600" y="686" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.14)" letter-spacing="3">flower-home.it</text>
</svg>